<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="50%" stop-color="#162d4a"/>
      <stop offset="100%" stop-color="#0e1f36"/>
    </linearGradient>

    <radialGradient id="shine" cx="30%" cy="15%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="centerGlow" cx="50%" cy="48%" r="42%">
      <stop offset="0%" stop-color="#4d9fff" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#3a7acc" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2a6ef5" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <filter id="centerNodeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="leafGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="linkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5ba8ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#48b8d0" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- macOS-style rounded background with padding -->
  <g filter="url(#shadow)">
    <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bgGrad)"/>
  </g>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#shine)"/>

  <!-- Ambient center glow -->
  <circle cx="512" cy="500" r="280" fill="url(#centerGlow)"/>

  <!-- Hub network centered -->
  <g transform="translate(512 498)">
    <!-- Connection lines (thicker, brighter) -->
    <line x1="0" y1="0" x2="-200" y2="-210" stroke="url(#linkGrad)" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="0" x2="210" y2="-195" stroke="url(#linkGrad)" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="0" x2="-235" y2="105" stroke="url(#linkGrad)" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="0" x2="240" y2="115" stroke="url(#linkGrad)" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="255" stroke="url(#linkGrad)" stroke-width="10" stroke-linecap="round" opacity="0.6"/>

    <!-- Leaf nodes (brighter, with glow) -->
    <circle cx="-200" cy="-210" r="48" fill="#42c8e8" filter="url(#leafGlow)" opacity="0.95"/>
    <circle cx="210" cy="-195" r="48" fill="#42c8e8" filter="url(#leafGlow)" opacity="0.95"/>
    <circle cx="-235" cy="105" r="48" fill="#42c8e8" filter="url(#leafGlow)" opacity="0.95"/>
    <circle cx="240" cy="115" r="48" fill="#42c8e8" filter="url(#leafGlow)" opacity="0.95"/>
    <circle cx="0" cy="255" r="48" fill="#42c8e8" filter="url(#leafGlow)" opacity="0.95"/>

    <!-- White highlights on leaf nodes -->
    <circle cx="-206" cy="-218" r="16" fill="#ffffff" opacity="0.18"/>
    <circle cx="204" cy="-203" r="16" fill="#ffffff" opacity="0.18"/>
    <circle cx="-241" cy="97" r="16" fill="#ffffff" opacity="0.18"/>
    <circle cx="234" cy="107" r="16" fill="#ffffff" opacity="0.18"/>
    <circle cx="-6" cy="247" r="16" fill="#ffffff" opacity="0.18"/>

    <!-- Center node (larger, prominent) -->
    <circle cx="0" cy="0" r="82" fill="#2a6ef5" filter="url(#centerNodeGlow)"/>
    <circle cx="0" cy="0" r="54" fill="#5ba8ff" opacity="0.3"/>
    <circle cx="-12" cy="-16" r="26" fill="#ffffff" opacity="0.12"/>
  </g>
</svg>
