<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="lightSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="40%" stop-color="#B0E0F6"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="78%" cy="16%" r="22%">
      <stop offset="0%" stop-color="#FFF7CC" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#FFE88A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFE88A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hillFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AB87A"/>
      <stop offset="100%" stop-color="#3A8F5C"/>
    </linearGradient>
    <linearGradient id="hillBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7FD4A0"/>
      <stop offset="100%" stop-color="#5AB87A"/>
    </linearGradient>
    <linearGradient id="lightFog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2FE" stop-opacity="0"/>
      <stop offset="100%" stop-color="#D4EBF8" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#lightSky)"/>
  <rect width="1920" height="1080" fill="url(#sunGlow)"/>

  <!-- Sun -->
  <circle cx="1490" cy="170" r="60" fill="#FFD93D" fill-opacity="0.95"/>
  <circle cx="1490" cy="170" r="80" fill="#FFD93D" fill-opacity="0.15"/>
  <circle cx="1490" cy="170" r="110" fill="#FFD93D" fill-opacity="0.06"/>

  <!-- Back hills -->
  <g fill="url(#hillBack)" fill-opacity="0.6">
    <ellipse cx="300" cy="750" rx="400" ry="180"/>
    <ellipse cx="900" cy="730" rx="500" ry="200"/>
    <ellipse cx="1500" cy="760" rx="450" ry="170"/>
  </g>

  <!-- Front hills -->
  <g fill="url(#hillFront)" fill-opacity="0.8">
    <ellipse cx="0" cy="820" rx="500" ry="220"/>
    <ellipse cx="600" cy="830" rx="450" ry="210"/>
    <ellipse cx="1200" cy="810" rx="500" ry="230"/>
    <ellipse cx="1920" cy="840" rx="480" ry="200"/>
  </g>

  <!-- Ground -->
  <rect y="850" width="1920" height="230" fill="#3A8F5C" fill-opacity="0.9"/>
  <rect y="850" width="1920" height="230" fill="url(#lightFog)"/>
</svg>
