name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            build_script: dist:mac
            artifact_name: wa-deck-mac
            artifact_path: |
              dist/*.dmg
              dist/*.dmg.blockmap
              dist/*.zip
              dist/*.zip.blockmap
              dist/latest-mac.yml
          - os: windows-2022
            build_script: dist:win
            artifact_name: wa-deck-win
            artifact_path: |
              dist/*.exe
              dist/*.exe.blockmap
              dist/latest.yml

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run ${{ matrix.build_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist-artifacts/**/*.dmg
            dist-artifacts/**/*.dmg.blockmap
            dist-artifacts/**/*.zip
            dist-artifacts/**/*.zip.blockmap
            dist-artifacts/**/*.exe
            dist-artifacts/**/*.exe.blockmap
            dist-artifacts/**/latest.yml
            dist-artifacts/**/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
