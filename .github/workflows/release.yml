name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    if: ${{ github.ref_name != 'v0.2.4' }}
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # src/renderer/dist/ is gitignored — the bundle must be built in CI or
      # the packaged app ships without its renderer (blank window).
      - name: Build renderer bundle
        run: npm run build:renderer

      # Signing + notarization are driven entirely by secrets: with them the
      # build is Developer-ID-signed and notarized, without them it stays
      # unsigned exactly as before (electron-builder skips on empty env).
      #   CSC_LINK                    — base64 .p12 с сертификатом Developer ID Application
      #   CSC_KEY_PASSWORD            — пароль от .p12
      #   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID — нотаризация
      - name: Build mac app
        run: npx electron-builder --mac dmg zip --arm64 --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wa-deck-mac
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.zip
            dist/*.zip.blockmap
            dist/latest-mac.yml
          if-no-files-found: error

  build-win:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # src/renderer/dist/ is gitignored — the bundle must be built in CI or
      # the packaged app ships without its renderer (blank window).
      - name: Build renderer bundle
        run: npm run build:renderer

      # Windows code signing (SmartScreen): подпись включается наличием
      # секретов, без них сборка остаётся неподписанной.
      #   WIN_CSC_LINK         — base64 .pfx с code-signing сертификатом
      #   WIN_CSC_KEY_PASSWORD — пароль от .pfx
      - name: Build win app
        run: npx electron-builder --win nsis portable --x64 --publish never
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload win artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wa-deck-win
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - build-mac
      - build-win
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-artifacts

      - name: Prepare release notes from changelog
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 == "## " ver { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release notes for ${version} not found in CHANGELOG.md" >&2
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name == 'v0.5.1' && 'v0.5.1 — Security hardening, UX polish, Electron 41.1.1' || github.ref_name }}
          draft: false
          # Any tag containing a hyphen (e.g. v0.7.5-preview.1, v1.0.0-rc.2)
          # is treated as a pre-release. electron-updater on the "latest"
          # channel ignores pre-releases by default, so existing users on a
          # stable version won't auto-update into the preview.
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release-notes.md
          files: |
            dist-artifacts/**/*.dmg
            dist-artifacts/**/*.dmg.blockmap
            dist-artifacts/**/*.zip
            dist-artifacts/**/*.zip.blockmap
            dist-artifacts/**/*.exe
            dist-artifacts/**/*.exe.blockmap
            dist-artifacts/**/latest.yml
            dist-artifacts/**/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure updater metadata assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t metadata_files < <(find dist-artifacts -type f \( -name 'latest.yml' -o -name 'latest-mac.yml' -o -name '*.blockmap' \))
          if [ ${#metadata_files[@]} -eq 0 ]; then
            echo "No updater metadata files found" >&2
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${metadata_files[@]}" --clobber
