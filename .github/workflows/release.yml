name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    if: ${{ matrix.os != 'macos-14' || github.ref_name != 'v0.2.3' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            build_script: dist:mac
            artifact_name: wa-deck-mac
            artifact_path: |
              dist/*.dmg
              dist/*.dmg.blockmap
              dist/*.zip
              dist/*.zip.blockmap
              dist/latest-mac.yml
          - os: windows-2022
            build_script: dist:win
            artifact_name: wa-deck-win
            artifact_path: |
              dist/*.exe
              dist/*.exe.blockmap
              dist/latest.yml

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run ${{ matrix.build_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Prepare release notes from changelog
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 == "## " ver { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release notes for ${version} not found in CHANGELOG.md" >&2
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: release-notes.md
          files: |
            dist-artifacts/**/*.dmg
            dist-artifacts/**/*.dmg.blockmap
            dist-artifacts/**/*.zip
            dist-artifacts/**/*.zip.blockmap
            dist-artifacts/**/*.exe
            dist-artifacts/**/*.exe.blockmap
            dist-artifacts/**/latest.yml
            dist-artifacts/**/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
